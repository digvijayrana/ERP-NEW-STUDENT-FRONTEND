<section class="workspace">
  <form *ngIf="vm.isAdmin" [formGroup]="vm.timetableForm" (ngSubmit)="vm.saveTimetable()" class="panel span-4">
    <div class="section-head"><div><p class="eyebrow">Timetable</p><h3>Build timetable</h3></div></div>
    <label>Academic year<select formControlName="academicYear"><option value="">Select</option><option *ngFor="let year of vm.years" [value]="year._id">{{ year.name }}</option></select></label>
    <label>Class<select formControlName="classRoom"><option value="">Select</option><option *ngFor="let room of vm.classes" [value]="room._id">{{ room.name }}-{{ room.section }}</option></select></label>
    <label>Day<select formControlName="dayOfWeek"><option value="monday">Monday</option><option value="tuesday">Tuesday</option><option value="wednesday">Wednesday</option><option value="thursday">Thursday</option><option value="friday">Friday</option><option value="saturday">Saturday</option></select></label>
    <label>Start<input type="time" formControlName="startTime"></label>
    <label>End<input type="time" formControlName="endTime"></label>
    <label>Subject<input formControlName="subject"></label>
    <label>Teacher<select formControlName="teacher"><option value="">Select</option><option *ngFor="let teacher of vm.teachers" [value]="teacher._id">{{ vm.teacherName(teacher) }}</option></select></label>
    <label>Room<input formControlName="room"></label>
    <button type="submit" [disabled]="vm.timetableForm.invalid">Save period</button>
  </form>

  <section class="data-card span-8">
    <div class="section-head"><div><p class="eyebrow">Schedule</p><h3>Class timetable</h3></div></div>
    <div class="toolbar">
      <div class="search-box"><input placeholder="Search day, class, subject" [value]="vm.filters.timetableSearch" (input)="vm.filters.timetableSearch = $any($event.target).value; vm.resetPage('timetable')"></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Day</th><th>Class</th><th>Periods</th></tr></thead>
        <tbody>
          <tr *ngFor="let row of vm.paged('timetable', vm.filteredTimetable)">
            <td>{{ row.dayOfWeek | titlecase }}</td>
            <td>{{ vm.className(row.classRoom) }}</td>
            <td><span class="period-chip" *ngFor="let period of row.periods">{{ period.startTime }}-{{ period.endTime }} {{ period.subject }}</span></td>
          </tr>
          <tr *ngIf="!vm.filteredTimetable.length"><td colspan="3" class="empty-cell">No timetable configured</td></tr>
        </tbody>
      </table>
    </div>
    <app-pagination-bar [vm]="vm" listKey="timetable" [items]="vm.filteredTimetable"></app-pagination-bar>
  </section>
</section>
